# Atlas Configuration
# Copy this file to config.yaml and customize for your environment

# Cache configuration
cache:
  # Type: "memory" (single-instance) or "redis" (multi-instance/multi-cluster)
  type: memory
  
  # Redis configuration (only used when type=redis)
  redis:
    addr: "localhost:6379"
    password: ""
    db: 0

# Cluster configuration
# For single-cluster mode: leave empty array []
# For multi-cluster mode: add cluster definitions below
clusters: []
  # Example: Single cluster using default kubeconfig
  - id: minikube
    name: Minikube Local
    kubeconfig: /Users/username/.kube/config
    api_server: https://192.168.49.2:8443
    region: local

  # Example: Multiple clusters with separate kubeconfig files
  - id: prod-us-east
    name: Production US East
    kubeconfig: /path/to/kubeconfigs/prod-us-east.yaml
    api_server: https://k8s-api.us-east.example.com
    region: us-east-1
    
  - id: prod-eu-west
    name: Production EU West
    kubeconfig: /path/to/kubeconfigs/prod-eu-west.yaml
    api_server: https://k8s-api.eu-west.example.com
    region: eu-west-1
    
  - id: staging
    name: Staging Environment
    kubeconfig: /path/to/kubeconfigs/staging.yaml
    api_server: https://k8s-api-staging.example.com
    region: us-east-1

# Server configuration
server:
  port: 8080
  
# Feature flags
features:
  # Enable multi-cluster support (shows cluster dropdown in UI)
  multi_cluster: false
